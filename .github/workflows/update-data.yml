name: Update data

# Refreshes pricing + benchmark data daily and commits the result so the
# deployed site always reads fresh data without a runtime fetch. Can also be
# triggered manually from the Actions tab.

on:
  schedule:
    # 08:00 UTC every day
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Fetch + merge data
        run: npm run update:data

      - name: Verify build
        run: npm run build

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh $(date -u +%Y-%m-%d)"
            git push
          fi
